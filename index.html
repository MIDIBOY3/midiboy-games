<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIDIBOY GAMES</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101216;
      color: #f3f4f6;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100% - 40px));
    }

    h1 {
      margin: 0 0 32px;
      font-size: clamp(2rem, 8vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .projects {
      display: grid;
      gap: 14px;
      margin: 0 0 32px;
      padding: 0;
      list-style: none;
    }

    .projects a,
    .links a {
      color: inherit;
      text-decoration: none;
    }

    .projects a {
      display: block;
      border: 1px solid #343842;
      border-radius: 8px;
      padding: 16px 18px;
      background: #181b21;
    }

    .label {
      display: block;
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      padding: 0;
      margin: 0;
      list-style: none;
      color: #d1d5db;
    }

    .links a {
      border-bottom: 1px solid currentColor;
    }
  </style>
</head>
<body>
  <main>
    <h1>MIDIBOY GAMES</h1>

    <ul class="projects">
      <li>
        <a href="genesis/">
          <span class="label">Project 000</span>
          <span class="title">GENESIS / R&amp;D Prototype</span>
        </a>
      </li>
      <li>
        <a href="zako/">
          <span class="label">Project 001</span>
          <span class="title">雑魚になろう。 / Web Pitch</span>
        </a>
      </li>
    </ul>

    <nav aria-label="links">
      <ul class="links">
        <li><a href="zako/">/zako/</a></li>
        <li><a href="genesis/">/genesis/</a></li>
        <li><a href="devlog/">/devlog/</a></li>
        <li><a href="company/">/company/</a></li>
      </ul>
    </nav>
  </main>
</body>
</html>
